services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: posiflora
      POSTGRES_PASSWORD: posiflora
      POSTGRES_DB: posiflora
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U posiflora"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build: .
    environment:
      DATABASE_URL: postgres://posiflora:posiflora@db:5432/posiflora?sslmode=disable
      PORT: "8080"
      TELEGRAM_REAL: "true"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
